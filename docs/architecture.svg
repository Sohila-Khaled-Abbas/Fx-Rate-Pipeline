<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">
  <defs>
    <style>
      .txt { font-family: 'Segoe UI', system-ui, sans-serif; fill: #e2e8f0; font-weight: 600; text-anchor: middle; }
      .lbl { font-size: 13px; }
      .sub { font-size: 11px; fill: #94a3b8; }
      .edge { font-size: 12px; fill: #64748b; font-weight: bold; }
    </style>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111625"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2035"/>
      <stop offset="100%" style="stop-color:#131929"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f5a623"/>
    </marker>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>

  <!-- LANES -->
  <rect x="250" y="50" width="1100" height="400" rx="15" fill="#070f1a" stroke="#72b043" stroke-width="1.5"/>
  <text x="800" y="80" class="txt" fill="#72b043" font-size="14" letter-spacing="3">APACHE NIFI</text>

  <!-- SOURCE -->
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="url(#card)" stroke="#00d4aa" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="60" cy="35" r="16" fill="none" stroke="#00d4aa" stroke-width="2"/>
    <ellipse cx="60" cy="35" rx="6" ry="16" fill="none" stroke="#00d4aa" stroke-width="1.5"/>
    <line x1="44" y1="35" x2="76" y2="35" stroke="#00d4aa" stroke-width="1.5"/>
    <text x="60" y="68" class="txt lbl">Frankfurter</text>
    <text x="60" y="84" class="txt sub">API</text>
  </g>

  <!-- P1: InvokeHTTP -->
  <g transform="translate(280, 200)">
    <rect x="0" y="0" width="130" height="100" rx="10" fill="url(#card)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <path d="M65,45 L80,30 M65,45 L50,30 M65,20 L65,45" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="45" y1="52" x2="85" y2="52" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <text x="65" y="75" class="txt lbl">InvokeHTTP</text>
  </g>

  <!-- P2: JoltTransformJSON -->
  <g transform="translate(460, 200)">
    <rect x="0" y="0" width="130" height="100" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <!-- Gear / Transform -->
    <circle cx="65" cy="35" r="12" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <path d="M50,35 L40,35 M80,35 L90,35 M65,20 L65,10 M65,50 L65,60" stroke="#f59e0b" stroke-width="2.5"/>
    <path d="M54,24 L48,18 M76,46 L82,52 M54,46 L48,52 M76,24 L82,18" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="65" y="75" class="txt lbl">JoltTransform</text>
  </g>

  <!-- P3: SplitJson -->
  <g transform="translate(640, 200)">
    <rect x="0" y="0" width="130" height="100" rx="10" fill="url(#card)" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
    <path d="M65,25 L85,25 L85,45 M85,25 L65,45" stroke="#a78bfa" stroke-width="2.5" fill="none"/>
    <path d="M65,45 L45,45 L45,25 M45,45 L65,25" stroke="#a78bfa" stroke-width="2.5" fill="none"/>
    <text x="65" y="75" class="txt lbl">SplitJson</text>
  </g>

  <!-- P4: EvaluateJsonPath -->
  <g transform="translate(820, 200)">
    <rect x="0" y="0" width="130" height="100" rx="10" fill="url(#card)" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
    <!-- Magnifier over JSON brackets -->
    <path d="M45,25 L35,25 L35,45 L45,45 M85,25 L95,25 L95,45 L85,45" stroke="#06b6d4" stroke-width="2" fill="none"/>
    <circle cx="60" cy="30" r="6" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <line x1="64" y1="34" x2="72" y2="42" stroke="#06b6d4" stroke-width="2"/>
    <text x="65" y="75" class="txt lbl">EvaluateJsonPath</text>
  </g>

  <!-- P5: DetectDuplicate -->
  <g transform="translate(1000, 200)">
    <rect x="0" y="0" width="130" height="100" rx="10" fill="url(#card)" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
    <path d="M50,25 L80,25 L80,45 L50,45 Z" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M55,30 L85,30 L85,50 L55,50 Z" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <text x="65" y="75" class="txt lbl">DetectDuplicate</text>
  </g>

  <!-- P6: PutDatabaseRecord -->
  <g transform="translate(1180, 200)">
    <rect x="0" y="0" width="130" height="100" rx="10" fill="url(#card)" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
    <path d="M50,40 L65,25 L80,40 M65,25 L65,50" stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="65" cy="55" rx="20" ry="4" stroke="#22c55e" stroke-width="2" fill="none"/>
    <text x="65" y="75" class="txt lbl">PutDatabaseRecord</text>
  </g>

  <!-- DATABASE -->
  <g transform="translate(1400, 200)">
    <rect x="0" y="0" width="120" height="100" rx="10" fill="url(#card)" stroke="#336791" stroke-width="2" filter="url(#shadow)"/>
    <ellipse cx="60" cy="28" rx="22" ry="7" fill="#336791"/>
    <rect x="38" y="28" width="44" height="24" fill="#336791"/>
    <ellipse cx="60" cy="52" rx="22" ry="7" fill="#0d1926" stroke="#336791" stroke-width="1.5"/>
    <text x="60" y="75" class="txt lbl">PostgreSQL</text>
    <text x="60" y="90" class="txt sub">fx_db</text>
  </g>

  <!-- CACHE -->
  <g transform="translate(1000, 360)">
    <ellipse cx="65" cy="20" rx="35" ry="10" fill="#f5a623" fill-opacity="0.8"/>
    <rect x="30" y="20" width="70" height="25" fill="#f5a623" fill-opacity="0.5"/>
    <ellipse cx="65" cy="45" rx="35" ry="10" fill="#f5a623" fill-opacity="0.8"/>
    <text x="65" y="70" class="txt lbl" fill="#fcd34d">Cache Server</text>
  </g>

  <!-- DUPLICATE TERMINATE -->
  <g transform="translate(1000, 60)">
    <rect x="25" y="0" width="80" height="30" rx="15" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="2"/>
    <text x="65" y="19" class="txt" fill="#fca5a5" font-size="11">DROP ✗</text>
  </g>


  <!-- EDGES -->
  <!-- API -> P1 -->
  <line x1="180" y1="250" x2="270" y2="250" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>
  <text x="225" y="240" class="txt edge" fill="#00d4aa">GET</text>

  <!-- P1 -> P2 -->
  <line x1="410" y1="250" x2="450" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="430" y="240" class="txt edge">{ }</text>

  <!-- P2 -> P3 -->
  <line x1="590" y1="250" x2="630" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="610" y="240" class="txt edge">[ { } ]</text>

  <!-- P3 -> P4 -->
  <line x1="770" y1="250" x2="810" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="790" y="240" class="txt edge">{ }</text>

  <!-- P4 -> P5 -->
  <line x1="950" y1="250" x2="990" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="970" y="240" class="txt edge">+ attr</text>

  <!-- P5 -> P6 -->
  <line x1="1130" y1="250" x2="1170" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="1150" y="240" class="txt edge" fill="#22c55e">✓</text>

  <!-- P6 -> DB -->
  <line x1="1310" y1="250" x2="1390" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="1350" y="240" class="txt edge" fill="#22c55e">INSERT</text>

  <!-- P5 -> DROP -->
  <line x1="1065" y1="200" x2="1065" y2="100" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- CACHE -> P5 -->
  <line x1="1065" y1="360" x2="1065" y2="310" stroke="#f5a623" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>

</svg>
